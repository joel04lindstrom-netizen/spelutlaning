<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Spelutlåning</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #0f1729;
      --navy-2:     #1a2540;
      --accent:     #4f8ef7;
      --accent-2:   #3a7af0;
      --text:       #f0f4ff;
      --text-muted: #8896b0;
      --surface:    #1e2d4a;
      --surface-2:  #253654;
      --border:     rgba(255,255,255,0.08);
      --radius:     14px;
      --radius-sm:  8px;
      --shadow:     0 4px 24px rgba(0,0,0,0.3);
      --sidebar-w:  240px;
      --header-h:   60px;
      --paper:      #f0f4ff;
      --paper-used: #3a7af0;
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--navy); color: var(--text);
      font-size: 16px; -webkit-font-smoothing: antialiased;
    }

    .app { display: flex; height: 100dvh; position: relative; }

    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 90; backdrop-filter: blur(2px);
    }
    .overlay.active { display: block; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w); background: var(--navy-2);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 100; transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); flex-shrink: 0;
    }
    .sidebar-brand { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-brand h1 { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; }
    .sidebar-brand p  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .sidebar nav {
      flex: 1; padding: 12px 10px;
      display: flex; flex-direction: column; gap: 4px; overflow-y: auto;
    }
    .nav-btn {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: var(--radius-sm);
      border: none; background: transparent; color: var(--text-muted);
      font-size: 15px; cursor: pointer; text-align: left; width: 100%;
      transition: background 0.15s, color 0.15s; font-family: inherit;
    }
    .nav-btn:hover  { background: var(--surface); color: var(--text); }
    .nav-btn.active { background: var(--accent-2); color: #fff; }
    .nav-icon { font-size: 18px; width: 22px; text-align: center; flex-shrink: 0; }
    .nav-group-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      color: var(--text-muted); text-transform: uppercase; padding: 12px 14px 4px;
    }
    .sidebar-footer { padding: 12px 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-muted); }

    /* ── Main ── */
    .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .topbar {
      height: var(--header-h); display: flex; align-items: center;
      padding: 0 16px; border-bottom: 1px solid var(--border);
      background: var(--navy-2); gap: 12px; flex-shrink: 0;
    }
    #menuToggle {
      display: none; background: none; border: none;
      color: var(--text); font-size: 22px; cursor: pointer;
      padding: 6px; border-radius: var(--radius-sm); line-height: 1;
    }
    #menuToggle:hover { background: var(--surface); }
    .topbar-title { font-size: 17px; font-weight: 600; color: var(--text); flex: 1; }
    .online-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4ade80; flex-shrink: 0; transition: background 0.3s;
    }
    .online-dot.offline { background: #f87171; }

    #view { flex: 1; overflow-y: auto; padding: 20px; }
    #view::-webkit-scrollbar { width: 6px; }
    #view::-webkit-scrollbar-track { background: transparent; }
    #view::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 3px; }

    /* ── View header ── */
    .view-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .view-header h2 { font-size: 22px; font-weight: 700; }
    .badge {
      background: var(--accent-2); color: #fff;
      font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
    }

    /* ── Search ── */
    .search-wrap { position: relative; margin-bottom: 16px; }
    .search-wrap input {
      width: 100%; padding: 10px 14px 10px 38px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.15s;
    }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-wrap input:focus { border-color: var(--accent-2); }
    .search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%); font-size: 16px; pointer-events: none;
    }

    /* ── Welcome ── */
    .welcome {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 60vh; text-align: center; gap: 16px;
    }
    .welcome-icon { font-size: 64px; }
    .welcome h2 { font-size: 26px; font-weight: 700; }
    .welcome p { color: var(--text-muted); font-size: 16px; }
    .welcome-btn {
      margin-top: 8px; padding: 14px 32px; background: var(--accent-2); color: #fff;
      border: none; border-radius: var(--radius); font-size: 16px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: transform 0.15s, background 0.15s;
    }
    .welcome-btn:hover { background: #2d6de0; transform: translateY(-1px); }

    /* ── Scanner ── */
    .scanner-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 20px 0; }
    #reader { width: min(320px, 90vw) !important; border-radius: var(--radius); overflow: hidden; border: 2px solid var(--accent); }
    .scan-hint { color: var(--text-muted); font-size: 14px; text-align: center; }
    .manual-entry { display: flex; gap: 8px; width: min(320px, 90vw); }
    .manual-entry input {
      flex: 1; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-size: 14px;
      font-family: inherit; outline: none; transition: border-color 0.15s; text-transform: uppercase;
    }
    .manual-entry input::placeholder { color: var(--text-muted); }
    .manual-entry input:focus { border-color: var(--accent-2); }
    .manual-entry button {
      padding: 10px 16px; background: var(--accent-2); color: #fff;
      border: none; border-radius: var(--radius-sm); font-size: 14px;
      cursor: pointer; font-family: inherit; font-weight: 600; white-space: nowrap;
    }

    /* ── Card profile ── */
    .card-profile {
      display: flex; flex-direction: column; align-items: center;
      padding: 28px 20px; background: var(--surface);
      border-radius: var(--radius); margin-bottom: 20px; border: 1px solid var(--border);
    }
    .profile-avatar {
      width: 72px; height: 72px; border-radius: 50%; background: var(--accent-2);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 12px;
    }
    .profile-name { font-size: 22px; font-weight: 700; }
    .profile-id   { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .profile-loan-status {
      margin-top: 10px; padding: 5px 14px;
      border-radius: 20px; font-size: 13px; font-weight: 600;
    }
    .profile-loan-status.active { background: rgba(239,68,68,0.15); color: #f87171; }
    .profile-loan-status.free   { background: rgba(34,197,94,0.15);  color: #4ade80; }

    /* ── Action buttons ── */
    .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .action-btn {
      padding: 16px 12px; border: none; border-radius: var(--radius);
      font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: transform 0.15s, filter 0.15s, opacity 0.15s;
    }
    .action-btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
    .action-btn:active:not(:disabled) { transform: scale(0.97); }
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .action-btn.primary   { background: var(--accent-2); color: #fff; }
    .action-btn.secondary { background: var(--surface-2); color: var(--text); }
    .action-btn.paper-btn { background: #166534; color: #bbf7d0; }
    .action-btn:only-child { grid-column: 1 / -1; }

    /* ── Return card ── */
    .return-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 20px; margin-bottom: 20px; border: 1px solid var(--border);
    }
    .return-game   { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .return-person { font-size: 14px; color: var(--text-muted); margin-bottom: 4px; }
    .return-time   { font-size: 13px; color: var(--text-muted); }

    /* ── Category tabs ── */
    .cat-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
    .cat-tab {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px; padding: 18px 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      font-family: inherit; color: var(--text);
    }
    .cat-tab:hover { background: var(--surface-2); transform: translateY(-2px); }
    .cat-tab-icon  { font-size: 32px; line-height: 1; }
    .cat-tab-label { font-size: 15px; font-weight: 600; }
    .cat-tab-count { font-size: 12px; color: var(--text-muted); }

    /* ── List ── */
    .list { display: flex; flex-direction: column; gap: 8px; }
    .list-item {
      display: flex; align-items: center; gap: 14px; padding: 14px 16px;
      background: var(--surface); border-radius: var(--radius-sm);
      border: 1px solid var(--border); transition: background 0.15s;
    }
    .list-item.clickable { cursor: pointer; }
    .list-item.clickable:hover { background: var(--surface-2); }
    .list-item.hidden { display: none; }
    .item-icon {
      font-size: 20px; width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .item-icon.avatar {
      background: var(--accent-2); border-radius: 50%;
      color: #fff; font-weight: 700; font-size: 15px;
    }
    .item-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
    .item-title { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-sub   { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-action { font-size: 13px; color: var(--accent); font-weight: 600; flex-shrink: 0; }

    .status-pill { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; flex-shrink: 0; }
    .status-pill.free   { background: rgba(34,197,94,0.15);  color: #4ade80; }
    .status-pill.loaned { background: rgba(239,68,68,0.15);  color: #f87171; }

    /* ── Alerts ── */
    .alert { padding: 14px 16px; border-radius: var(--radius-sm); margin-bottom: 16px; font-size: 15px; line-height: 1.5; }
    .alert.warning { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); color: #fcd34d; }
    .alert.info    { background: rgba(79,142,247,0.15);  border: 1px solid rgba(79,142,247,0.3);  color: #93c5fd; }
    .alert.error   { background: rgba(239,68,68,0.15);   border: 1px solid rgba(239,68,68,0.3);   color: #f87171; }
    .alert.success { background: rgba(34,197,94,0.15);   border: 1px solid rgba(34,197,94,0.3);   color: #4ade80; }

    .back-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-muted); padding: 10px 18px;
      border-radius: var(--radius-sm); font-size: 14px;
      cursor: pointer; font-family: inherit; transition: color 0.15s, border-color 0.15s;
    }
    .back-btn:hover { color: var(--text); border-color: var(--text-muted); }

    .loading, .empty-state { text-align: center; color: var(--text-muted); padding: 40px 20px; font-size: 15px; }
    .no-results { text-align: center; color: var(--text-muted); padding: 24px; font-size: 14px; display: none; }
    .no-results.visible { display: block; }

    .shop-section-title {
      font-size: 13px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em; margin: 20px 0 10px;
    }

    /* ── Admin button ── */
    .admin-btn { color: #f87171 !important; margin-top: auto; }
    .admin-btn:hover  { background: rgba(239,68,68,0.12) !important; color: #fca5a5 !important; }
    .admin-btn.active { background: rgba(239,68,68,0.2) !important; color: #fca5a5 !important; }

    /* ── Admin panel ── */
    .admin-card {
      background: var(--surface); border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--radius); padding: 24px; margin-bottom: 16px;
    }
    .admin-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: #f87171; }
    .admin-card p  { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; }
    .admin-danger-btn {
      padding: 14px 20px; border: none; border-radius: var(--radius-sm);
      background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3);
      color: #f87171; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit; width: 100%;
      transition: background 0.15s, transform 0.1s;
    }
    .admin-danger-btn:hover:not(:disabled) { background: rgba(239,68,68,0.25); transform: translateY(-1px); }
    .admin-danger-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Card detail profile ── */
    .card-detail {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px 20px;
      display: flex; flex-direction: column; align-items: center;
      gap: 8px; margin-bottom: 20px; text-align: center;
    }
    .card-detail-avatar {
      width: 80px; height: 80px; border-radius: 50%; background: var(--accent-2);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 700; color: #fff; margin-bottom: 4px;
    }
    .card-detail-name { font-size: 24px; font-weight: 700; }
    .card-detail-id   { font-size: 13px; color: var(--text-muted); }
    .card-detail-row  {
      display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; justify-content: center;
    }
    .card-detail-stat {
      background: var(--navy); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 18px;
      font-size: 13px; color: var(--text-muted); text-align: center;
    }
    .card-detail-stat strong { display: block; font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 2px; }

    /* ══════════════════════════════════════
       PAPER SYSTEM
    ══════════════════════════════════════ */

    /* Small paper badge on card profile */
    .paper-badge {
      margin-top: 10px; padding: 5px 14px;
      background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.25);
      border-radius: 20px; font-size: 13px; font-weight: 600; color: #4ade80;
      display: flex; align-items: center; gap: 6px;
    }

    /* Paper view wrapper */
    .paper-view {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px 20px;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      margin-bottom: 20px;
    }

    .paper-person { font-size: 18px; font-weight: 700; }
    .paper-subtitle { font-size: 13px; color: var(--text-muted); margin-top: -14px; }

    /* Circle tracker */
    .paper-circles {
      display: flex; gap: 12px; align-items: center; justify-content: center;
      background: var(--navy); border-radius: var(--radius);
      padding: 18px 24px; border: 1px solid var(--border); width: 100%;
    }
    .paper-circle {
      width: 52px; height: 52px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.15);
      background: var(--surface-2);
      transition: background 0.3s, border-color 0.3s, transform 0.2s;
    }
    .paper-circle.used {
      background: var(--accent-2);
      border-color: var(--accent);
      transform: scale(1.05);
    }

    /* Count text */
    .paper-count-text {
      font-size: 17px; font-weight: 700; color: var(--text);
      text-align: center;
    }
    .paper-count-text span { color: var(--accent); }

    /* Buy buttons */
    .paper-buy-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%;
    }
    .paper-buy-btn {
      padding: 16px 8px; border: none; border-radius: var(--radius);
      background: #166534; color: #bbf7d0;
      font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      transition: transform 0.15s, filter 0.15s, opacity 0.15s;
    }
    .paper-buy-btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.15); }
    .paper-buy-btn:active:not(:disabled) { transform: scale(0.97); }
    .paper-buy-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .paper-buy-btn .btn-label { font-size: 16px; }
    .paper-buy-btn .btn-sub   { font-size: 12px; opacity: 0.75; }

    /* Max notice */
    .paper-max-notice {
      font-size: 13px; color: var(--text-muted); text-align: center;
      padding: 10px; background: var(--navy); border-radius: var(--radius-sm);
      border: 1px solid var(--border); width: 100%;
    }

    /* ── Credits / shop ── */
    .shop-empty {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px 20px;
      display: flex; flex-direction: column; align-items: center;
      gap: 12px; text-align: center; margin-bottom: 20px;
    }
    .shop-empty-icon { font-size: 48px; }
    .shop-empty-text { font-size: 15px; color: var(--text-muted); line-height: 1.5; }
    .credit-banner {
      margin-top: 10px; padding: 5px 14px;
      background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.25);
      border-radius: 20px; font-size: 13px; font-weight: 600; color: #fcd34d;
      display: flex; align-items: center; gap: 6px;
    }

    /* Admin number input row */
    .admin-input-row {
      display: flex; gap: 8px; margin-top: 10px;
    }
    .admin-input-row select, .admin-input-row input {
      flex: 1; padding: 10px 12px;
      background: var(--navy); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-size: 14px; font-family: inherit; outline: none;
      transition: border-color 0.15s;
    }
    .admin-input-row select:focus, .admin-input-row input:focus { border-color: var(--accent-2); }
    .admin-input-row button {
      padding: 10px 16px; border: none; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
      white-space: nowrap; transition: filter 0.15s;
    }
    .admin-input-row button:hover { filter: brightness(1.1); }
    .btn-add { background: #166534; color: #bbf7d0; }
    .btn-remove { background: #7f1d1d; color: #fca5a5; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--navy-2); color: var(--text); border: 1px solid var(--border);
      padding: 12px 24px; border-radius: var(--radius); font-size: 14px; font-weight: 500;
      box-shadow: var(--shadow); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      z-index: 9999; white-space: nowrap; max-width: 90vw;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Offline banner ── */
    #offline-banner {
      display: none; position: fixed; top: 0; left: 0; right: 0;
      background: rgba(239,68,68,0.9); color: #fff;
      text-align: center; padding: 8px; font-size: 13px; font-weight: 600; z-index: 9998;
    }
    #offline-banner.show { display: block; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      :root { --sidebar-w: 260px; }
      .sidebar { position: fixed; top: 0; left: 0; height: 100%; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      #menuToggle { display: flex; }
      .content { width: 100%; }
      #view { padding: 16px; }
      .action-grid { grid-template-columns: 1fr; }
      .welcome h2 { font-size: 22px; }
      .welcome-icon { font-size: 52px; }
    }
    @media (min-width: 769px) and (max-width: 1024px) {
      :root { --sidebar-w: 200px; }
      .nav-btn { font-size: 14px; padding: 10px 12px; }
    }
  </style>
</head>
<body>

<div id="offline-banner">⚠️ Ingen internetanslutning – ändringar sparas inte</div>
<div class="overlay" onclick="closeSidebar()"></div>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h1>🎲 Spelutlåning</h1>
      <p>Hantera lån enkelt</p>
    </div>
    <nav>
      <div class="nav-group-label">Lån</div>

const INIT_VERSION = "v6";
async function initData() {
  try {
    const meta = await db.collection("meta").doc("init").get();
    if (meta.exists && meta.data().version === INIT_VERSION) return;
    const batch = db.batch();
    cardsData.forEach(c =>
      batch.set(db.collection("cards").doc(c.cardId),
        {name:c.name, activeLoan:false, papers:0, lastPaperWeek: getISOWeek()},
        {merge:true})
    );
    gamesData.forEach(g =>
      batch.set(db.collection("games").doc(g.gameId),
        {title:g.title, isLoaned:false, category:g.category}, {merge:true})
    );
    batch.set(db.collection("meta").doc("init"), {version:INIT_VERSION, at:firebase.firestore.Timestamp.now()});
    await batch.commit();
  } catch(e) { console.warn("initData:", e); }
}
initData();

function getISOWeek() {
  const d = new Date();
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 4 - (d.getDay() || 7));
  const yearStart = new Date(d.getFullYear(), 0, 1);
  return `${d.getFullYear()}-W${Math.ceil((((d - yearStart) / 86400000) + 1) / 7)}`;
}

// Tops up papers to MAX if it's a new week, returns current count
async function maybeRefillPapers(cardRef) {
  const data = (await cardRef.get()).data();
  const thisWeek = getISOWeek();
  if ((data.lastPaperWeek || "") !== thisWeek) {
    // New week: fill up to MAX (don't go over)
    const newCount = 0; // reset: 0 taken this week = all 5 available
    await cardRef.update({ papers: newCount, lastPaperWeek: thisWeek });
    return { count: newCount, refilled: true };
  }
  return { count: data.papers ?? MAX_PAPERS, refilled: false };
}

function buildCircles(count) {
  return Array.from({length: MAX_PAPERS}, (_, i) =>
    `<div class="paper-circle ${i < count ? 'used' : ''}"></div>`
  ).join("");
}

function esc(str) {
  return String(str)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

let qrScanner = null, scannerRunning = false, scanLock = false;

async function stopScanner() {
  if (qrScanner && scannerRunning) {
    try { await qrScanner.stop(); } catch(_) {}
    scannerRunning = false;
  }
}

function startScanner(onScan) {
  stopScanner().then(() => {
    scanLock = false;
    qrScanner = new Html5Qrcode("reader");
    qrScanner.start(
      {facingMode:"environment"},
      {fps:10, qrbox:{width:250,height:250}},
      code => {
        if (scanLock) return;
        scanLock = true;
        const el = document.getElementById("scanResult");
        if (el) el.textContent = "Skannar: " + code;
        onScan(code);
      },
      () => {}
    )
    .then(() => { scannerRunning = true; })
    .catch(() => {
      const el = document.getElementById("scanResult");
      if (el) el.textContent = "Kunde inte starta kamera — använd manuell inmatning nedan.";
    });
  });
}

function manualPaperLookup() {
  const val = (document.getElementById("manualId")?.value || "").trim().toUpperCase();
  if (!val) { showToast("Ange ett kort-ID"); return; }
  showPaperForCard(val);

async function showPaperForCard(cardId) {
  scanLock = true; // prevent scanner re-entry
  try {
    const cardRef = db.collection("cards").doc(cardId);
    const cardDoc = await cardRef.get();
    if (!cardDoc.exists) { showToast("❌ Kortet finns inte: " + cardId); scanLock = false; return; }

    const { count, refilled } = await maybeRefillPapers(cardRef);
    const card = (await cardRef.get()).data();
    stopScanner();

    const atMax    = count >= MAX_PAPERS;
    const canTake1 = count < MAX_PAPERS;
    const canTake2 = count <= MAX_PAPERS - 2;

    const refillMsg = refilled
      ? `<div class="alert success" style="margin-bottom:0">🎉 Ny vecka! Ditt papper fylldes på till ${MAX_PAPERS}.</div>`
      : "";

    document.getElementById("view").innerHTML = `
      <div class="view-header"><h2>Köp papper</h2></div>
      ${refillMsg}
      <div class="paper-view">
        <div class="paper-person">${esc(card.name)}</div>
        <div class="paper-subtitle">${esc(cardId)}</div>

        <div class="paper-circles">
          ${buildCircles(count)}
        </div>

        <div class="paper-count-text">
          Du har köpt <span>${count} av ${MAX_PAPERS}</span> papper
        </div>

        ${atMax
          ? `<div class="paper-max-notice">Du har redan tagit ditt maxantal papper den här veckan 📄</div>`
          : `<div class="paper-buy-grid">
               <button class="paper-buy-btn" ${canTake1 ? '' : 'disabled'}
                 onclick="takePapers('${esc(cardId)}', 1)">
                 <span class="btn-label">1 papper</span>
                 <span class="btn-sub">Hämta 1 st</span>
               </button>
               <button class="paper-buy-btn" ${canTake2 ? '' : 'disabled'}
                 onclick="takePapers('${esc(cardId)}', 2)">
                 <span class="btn-label">2 papper</span>
                 <span class="btn-sub">Hämta 2 st</span>
               </button>
             </div>`
        }
      </div>
      <button class="back-btn" onclick="showView('paper')">← Byt kort</button>`;
  } catch(e) { showError(e); }
}

async function takePapers(cardId, amount) {
  // Disable both buttons immediately
  document.querySelectorAll('.paper-buy-btn').forEach(b => { b.disabled = true; b.style.opacity = "0.5"; });
  try {
    const cardRef  = db.collection("cards").doc(cardId);
    const cardData = (await cardRef.get()).data();
    const current  = cardData.papers ?? 0;

    if (current + amount > MAX_PAPERS) {
      showToast("❌ Du kan inte ta fler papper den här veckan");
      await showPaperForCard(cardId);
      return;
    }

    const newCount = current + amount;
    // "papers" tracks how many taken this week (0 = none taken, MAX = all taken)
    // Actually we store remaining capacity: let's store "taken" count
    // Field "papers" = how many already taken this week
    await cardRef.update({ papers: newCount });

    await db.collection("history").add({
      cardId, name: cardData.name,
      action: "paper", amount,
      remaining: MAX_PAPERS - newCount,
      timestamp: firebase.firestore.Timestamp.now()
    });

    showToast(`✅ ${cardData.name} hämtade ${amount} papper`);
    await showPaperForCard(cardId);
  } catch(e) { showError(e); }
}

//  SEARCH FILTER
// ═══════════════════════════════════════════
function filterList(query) {
  const q = query.toLowerCase().trim();
  const items = document.querySelectorAll("#itemList .list-item");
  let visible = 0;
  items.forEach(item => {
    const match = !q || (item.dataset.search || "").includes(q);
    item.classList.toggle("hidden", !match);
    if (match) visible++;
  });
  const noRes = document.getElementById("noResults");
  if (noRes) noRes.classList.toggle("visible", visible === 0 && q.length > 0);
}

async function handleCardScan(cardId) {
  scanLock = true; // prevent re-entry
  try {
    const doc = await db.collection("cards").doc(cardId).get();
    if (!doc.exists) { showToast("❌ Kortet finns inte: " + cardId); scanLock = false; return; }
    const card = doc.data();
    // Refill papers if new week
    const { count } = await maybeRefillPapers(db.collection("cards").doc(cardId));
    // Re-read after refill
    const freshCard = (await db.collection("cards").doc(cardId).get()).data();
    const credits   = freshCard.credits ?? 0;
    stopScanner();

    const papersLeft = MAX_PAPERS - count;

    document.getElementById("view").innerHTML = `

async function borrowGame(cardId, gameId, encodedTitle, el) {
  if (el) { el.style.pointerEvents="none"; el.style.opacity="0.5"; }
  const gameTitle = decodeURIComponent(encodedTitle);
  try {
    const cardRef  = db.collection("cards").doc(cardId);
    const cardData = (await cardRef.get()).data();
    const gameDoc  = await db.collection("games").doc(gameId).get();
    const category = gameDoc.data().category || "spel";
    const batch = db.batch();
    batch.update(cardRef, {activeLoan:true, currentGame:gameTitle});
    batch.update(db.collection("games").doc(gameId), {isLoaned:true});
    batch.set(db.collection("activeLoans").doc(cardId), {
      cardId, gameId, gameTitle, name:cardData.name, category,
      loanedAt: new Date().toLocaleString("sv-SE")
    });
    await batch.commit();
    await db.collection("history").add({
      cardId, gameId, gameTitle, name:cardData.name, action:"loan", category,
      timestamp: firebase.firestore.Timestamp.now()
    });
    showToast(`✅ ${cardData.name} har lånat ${gameTitle}`);
    navigate("scan", document.getElementById("nav-scan"));
  } catch(e) {
    if (el) { el.style.pointerEvents=""; el.style.opacity=""; }
    showError(e);
  }
}

async function returnGame(cardId, gameId, encodedTitle) {
  const btn = document.getElementById("confirmReturnBtn");
  if (btn) { btn.disabled=true; btn.textContent="Sparar…"; }
  const gameTitle = decodeURIComponent(encodedTitle);
  try {
    const cardRef  = db.collection("cards").doc(cardId);
    const cardName = (await cardRef.get()).data().name;
    const batch = db.batch();
    batch.update(cardRef, {activeLoan:false, currentGame:firebase.firestore.FieldValue.delete()});
    batch.update(db.collection("games").doc(gameId), {isLoaned:false});
    batch.delete(db.collection("activeLoans").doc(cardId));
    await batch.commit();
    await db.collection("history").add({
      cardId, gameId, gameTitle, name:cardName, action:"return",
      timestamp: firebase.firestore.Timestamp.now()
    });
    showToast(`✅ ${cardName} har lämnat tillbaka ${gameTitle}`);
    navigate("scan", document.getElementById("nav-scan"));
  } catch(e) {
    if (btn) { btn.disabled=false; btn.textContent="✅ Bekräfta återlämning"; }
    showError(e);
  }
}

let toastTimer = null;
function showToast(msg) {
  let toast = document.getElementById("toast");
  if (!toast) {
    toast = document.createElement("div"); toast.id = "toast";
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.classList.add("show");
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("show"), 3500);
}

async function resetAllPapers() {
  const btn = document.getElementById("resetBtn");
  if (!btn) return;
  if (!confirm(`Återställa ALLA ${cardsData.length} lånekort till ${MAX_PAPERS} papper?`)) return;
  btn.disabled = true; btn.textContent = "Återställer...";
  try {
    // Firebase batches max 500 ops — split if needed
    const chunks = [];
    for (let i = 0; i < cardsData.length; i += 400) chunks.push(cardsData.slice(i, i+400));
    for (const chunk of chunks) {
      const batch = db.batch();
      chunk.forEach(c => {
        batch.update(db.collection("cards").doc(c.cardId), {
          papers: 0,
          lastPaperWeek: getISOWeek()
        });
      });
      await batch.commit();
    }
    showToast(`✅ Alla ${cardsData.length} kort återställda till ${MAX_PAPERS} papper`);
    btn.textContent = "✅ Klart!";
    setTimeout(() => loadAdminOverview(), 500);
  } catch(e) {
    btn.disabled = false; btn.textContent = `🔄 Återställ alla till ${MAX_PAPERS} papper`;
    showError(e);
  }
}

// ═══════════════════════════════════════════
//  ADMIN: ADJUST PAPERS (individual)
// ═══════════════════════════════════════════
async function adjustPapers(direction) {
  const cardId = document.getElementById("paperPerson")?.value;
  const amt    = parseInt(document.getElementById("paperAmt")?.value) || 1;
  if (!cardId || amt < 1) { showToast("Välj person och ange antal"); return; }
  try {
    const cardRef  = db.collection("cards").doc(cardId);
    const cardData = (await cardRef.get()).data();
    let current    = cardData.papers ?? 0;
    // "papers" = how many taken. Add = give more available = reduce taken count.
    if (direction === "add") {
      current = Math.max(0, current - amt); // fewer taken = more available
    } else {
      current = Math.min(MAX_PAPERS, current + amt); // more taken = fewer available
    }
    await cardRef.update({ papers: current });
    const left = MAX_PAPERS - current;
    showToast(`✅ ${cardData.name}: ${left}/${MAX_PAPERS} papper kvar`);
    loadAdminOverview();
  } catch(e) { showError(e); }
}

//  ADMIN: CREDITS +500 TO ALL
// ═══════════════════════════════════════════
async function giveCreditsToAll() {
  const btn = document.getElementById("creditsAllBtn");
  if (!confirm(`Ge +500 kr till alla ${cardsData.length} personer?`)) return;
  if (btn) { btn.disabled = true; btn.textContent = "Ger krediter..."; }
  try {
    const chunks = [];
    for (let i = 0; i < cardsData.length; i += 400) chunks.push(cardsData.slice(i, i+400));
    for (const chunk of chunks) {
      const batch = db.batch();
      chunk.forEach(c => {
        batch.update(db.collection("cards").doc(c.cardId), {
          credits: firebase.firestore.FieldValue.increment(500)
        });
      });
      await batch.commit();
    }
    showToast(`✅ Alla ${cardsData.length} personer fick +500 kr`);
    if (btn) { btn.disabled = false; btn.textContent = "🪙 Ge +500 kr till alla"; }
    loadAdminOverview();
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = "🪙 Ge +500 kr till alla"; }
    showError(e);
  }
}

// ═══════════════════════════════════════════
//  ADMIN: ADJUST CREDITS (individual)
// ═══════════════════════════════════════════
async function adjustCredits(direction) {
  const cardId = document.getElementById("creditPerson")?.value;
  const amt    = parseInt(document.getElementById("creditAmt")?.value) || 0;
  if (!cardId || amt < 1) { showToast("Välj person och ange belopp"); return; }
  try {
    const cardRef  = db.collection("cards").doc(cardId);
    const cardData = (await cardRef.get()).data();
    let current    = cardData.credits ?? 0;
    if (direction === "add") {
      current = current + amt;
    } else {
      current = Math.max(0, current - amt);
    }
    await cardRef.update({ credits: current });
    showToast(`✅ ${cardData.name}: ${current} kr`);
    loadAdminOverview();
  } catch(e) { showError(e); }
}

// ═══════════════════════════════════════════
//  SHOP VIEW (empty for now)
// ═══════════════════════════════════════════
async function showShopForCard(cardId) {
  try {
    const cardRef = db.collection("cards").doc(cardId);
    const cardDoc = await cardRef.get();
    if (!cardDoc.exists) { showToast("❌ Kortet finns inte"); return; }
    const card    = cardDoc.data();
    const credits = card.credits ?? 0;
    stopScanner();
    document.getElementById("view").innerHTML = `
      <div class="view-header"><h2>Butik</h2></div>
      <div class="card-profile" style="margin-bottom:16px">
        <div class="profile-avatar">${esc(card.name[0])}</div>
        <div class="profile-name">${esc(card.name)}</div>
        <div class="credit-banner">🪙 <strong>${credits} kr</strong> butikssaldo</div>
      </div>
      <div class="shop-empty">
        <div class="shop-empty-icon">🛒</div>
        <div class="shop-empty-text">Butiken är tom just nu.<br>Varor kommer att läggas till snart!</div>
      </div>
      <button class="back-btn" onclick="handleCardScan('${esc(cardId)}')">← Tillbaka</button>`;
  } catch(e) { showError(e); }
}
