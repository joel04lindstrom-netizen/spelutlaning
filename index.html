<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>Spelutlåning</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:     #0f1729;
      --navy-2:   #1a2540;
      --accent:   #4f8ef7;
      --accent-2: #3a7af0;
      --text:     #f0f4ff;
      --text-muted: #8896b0;
      --surface:  #1e2d4a;
      --surface-2:#253654;
      --border:   rgba(255,255,255,0.08);
      --radius:   14px;
      --radius-sm:8px;
      --shadow:   0 4px 24px rgba(0,0,0,0.3);
      --sidebar-w:240px;
      --header-h: 60px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--navy);
      color: var(--text);
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    .app { display: flex; height: 100dvh; position: relative; }

    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 90;
      backdrop-filter: blur(2px);
    }
    .overlay.active { display: block; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--navy-2);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 100;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      flex-shrink: 0;
    }
    .sidebar-brand { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-brand h1 { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; }
    .sidebar-brand p  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .sidebar nav {
      flex: 1; padding: 12px 10px;
      display: flex; flex-direction: column; gap: 4px;
      overflow-y: auto;
    }
    .nav-btn {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: var(--radius-sm);
      border: none; background: transparent;
      color: var(--text-muted); font-size: 15px;
      cursor: pointer; text-align: left; width: 100%;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
    }
    .nav-btn:hover  { background: var(--surface); color: var(--text); }
    .nav-btn.active { background: var(--accent-2); color: #fff; }
    .nav-icon { font-size: 18px; width: 22px; text-align: center; flex-shrink: 0; }
    .sidebar-footer { padding: 12px 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-muted); }

    /* ── Main ── */
    .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    .topbar {
      height: var(--header-h);
      display: flex; align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      background: var(--navy-2); gap: 12px; flex-shrink: 0;
    }
    #menuToggle {
      display: none; background: none; border: none;
      color: var(--text); font-size: 22px; cursor: pointer;
      padding: 6px; border-radius: var(--radius-sm); line-height: 1;
    }
    #menuToggle:hover { background: var(--surface); }
    .topbar-title { font-size: 17px; font-weight: 600; color: var(--text); flex: 1; }

    .online-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4ade80; flex-shrink: 0; transition: background 0.3s;
    }
    .online-dot.offline { background: #f87171; }

    #view { flex: 1; overflow-y: auto; padding: 20px; }
    #view::-webkit-scrollbar { width: 6px; }
    #view::-webkit-scrollbar-track { background: transparent; }
    #view::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 3px; }

    /* ── View header ── */
    .view-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .view-header h2 { font-size: 22px; font-weight: 700; }

    .badge {
      background: var(--accent-2); color: #fff;
      font-size: 12px; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
    }

    /* ── Search ── */
    .search-wrap { position: relative; margin-bottom: 16px; }
    .search-wrap input {
      width: 100%; padding: 10px 14px 10px 38px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-size: 15px; font-family: inherit;
      outline: none; transition: border-color 0.15s;
    }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-wrap input:focus { border-color: var(--accent-2); }
    .search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%); font-size: 16px;
      pointer-events: none;
    }

    /* ── Welcome ── */
    .welcome {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 60vh; text-align: center; gap: 16px;
    }
    .welcome-icon { font-size: 64px; }
    .welcome h2 { font-size: 26px; font-weight: 700; }
    .welcome p { color: var(--text-muted); font-size: 16px; }
    .welcome-btn {
      margin-top: 8px; padding: 14px 32px;
      background: var(--accent-2); color: #fff;
      border: none; border-radius: var(--radius);
      font-size: 16px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: transform 0.15s, background 0.15s;
    }
    .welcome-btn:hover { background: #2d6de0; transform: translateY(-1px); }

    /* ── Scanner ── */
    .scanner-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 20px 0; }
    #reader { width: min(320px, 90vw) !important; border-radius: var(--radius); overflow: hidden; border: 2px solid var(--accent); }
    .scan-hint { color: var(--text-muted); font-size: 14px; text-align: center; }

    .manual-entry { display: flex; gap: 8px; width: min(320px, 90vw); }
    .manual-entry input {
      flex: 1; padding: 10px 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-size: 14px; font-family: inherit; outline: none;
      transition: border-color 0.15s; text-transform: uppercase;
    }
    .manual-entry input::placeholder { color: var(--text-muted); }
    .manual-entry input:focus { border-color: var(--accent-2); }
    .manual-entry button {
      padding: 10px 16px;
      background: var(--accent-2); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-size: 14px; cursor: pointer; font-family: inherit;
      font-weight: 600; white-space: nowrap;
      transition: background 0.15s;
    }
    .manual-entry button:hover { background: #2d6de0; }

    /* ── Card profile ── */
    .card-profile {
      display: flex; flex-direction: column; align-items: center;
      padding: 28px 20px; background: var(--surface);
      border-radius: var(--radius); margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    .profile-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--accent-2);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700; color: #fff;
      margin-bottom: 12px;
    }
    .profile-name { font-size: 22px; font-weight: 700; }
    .profile-id   { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .profile-loan-status {
      margin-top: 10px; padding: 5px 14px;
      border-radius: 20px; font-size: 13px; font-weight: 600;
    }
    .profile-loan-status.active { background: rgba(239,68,68,0.15); color: #f87171; }
    .profile-loan-status.free   { background: rgba(34,197,94,0.15);  color: #4ade80; }

    /* ── Action buttons ── */
    .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .action-btn {
      padding: 16px 12px; border: none;
      border-radius: var(--radius); font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: transform 0.15s, filter 0.15s, opacity 0.15s;
    }
    .action-btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
    .action-btn:active:not(:disabled) { transform: scale(0.97); }
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .action-btn.primary   { background: var(--accent-2); color: #fff; }
    .action-btn.secondary { background: var(--surface-2); color: var(--text); }
    .action-btn:only-child { grid-column: 1 / -1; }

    /* ── Return card ── */
    .return-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 20px; margin-bottom: 20px; border: 1px solid var(--border);
    }
    .return-game   { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .return-person { font-size: 14px; color: var(--text-muted); margin-bottom: 4px; }
    .return-time   { font-size: 13px; color: var(--text-muted); }

    /* ── List ── */
    .list { display: flex; flex-direction: column; gap: 8px; }
    .list-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      background: var(--surface); border-radius: var(--radius-sm);
      border: 1px solid var(--border); transition: background 0.15s;
    }
    .list-item.clickable { cursor: pointer; }
    .list-item.clickable:hover { background: var(--surface-2); }
    .list-item.hidden { display: none; }

    .item-icon {
      font-size: 20px; width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .item-icon.avatar {
      background: var(--accent-2); border-radius: 50%;
      color: #fff; font-weight: 700; font-size: 15px;
    }
    .item-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
    .item-title { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-sub   { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-action { font-size: 13px; color: var(--accent); font-weight: 600; flex-shrink: 0; }

    .status-pill { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; flex-shrink: 0; }
    .status-pill.free   { background: rgba(34,197,94,0.15);  color: #4ade80; }
    .status-pill.loaned { background: rgba(239,68,68,0.15);  color: #f87171; }

    /* ── Alerts ── */
    .alert { padding: 14px 16px; border-radius: var(--radius-sm); margin-bottom: 16px; font-size: 15px; line-height: 1.5; }
    .alert.warning { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); color: #fcd34d; }
    .alert.info    { background: rgba(79,142,247,0.15);  border: 1px solid rgba(79,142,247,0.3);  color: #93c5fd; }
    .alert.error   { background: rgba(239,68,68,0.15);   border: 1px solid rgba(239,68,68,0.3);   color: #f87171; }

    .back-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-muted); padding: 10px 18px;
      border-radius: var(--radius-sm); font-size: 14px;
      cursor: pointer; font-family: inherit;
      transition: color 0.15s, border-color 0.15s;
    }
    .back-btn:hover { color: var(--text); border-color: var(--text-muted); }

    .loading, .empty-state { text-align: center; color: var(--text-muted); padding: 40px 20px; font-size: 15px; }

    .no-results { text-align: center; color: var(--text-muted); padding: 24px; font-size: 14px; display: none; }
    .no-results.visible { display: block; }

    /* ── Category tabs ── */
    .cat-tabs {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 18px;
    }
    .cat-tab {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px;
      padding: 18px 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      font-family: inherit; color: var(--text);
    }
    .cat-tab:hover { background: var(--surface-2); transform: translateY(-2px); }
    .cat-tab.selected {
      border-color: var(--accent-2);
      background: rgba(58,122,240,0.12);
    }
    .cat-tab-icon { font-size: 32px; line-height: 1; }
    .cat-tab-label { font-size: 15px; font-weight: 600; }
    .cat-tab-count { font-size: 12px; color: var(--text-muted); }
    .cat-tab.selected .cat-tab-count { color: var(--accent); }

    /* ── Sidebar nav group ── */
    .nav-group-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      color: var(--text-muted); text-transform: uppercase;
      padding: 12px 14px 4px;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--navy-2); color: var(--text);
      border: 1px solid var(--border);
      padding: 12px 24px; border-radius: var(--radius);
      font-size: 14px; font-weight: 500;
      box-shadow: var(--shadow);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      z-index: 9999; white-space: nowrap;
      max-width: 90vw; text-overflow: ellipsis; overflow: hidden;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Offline banner ── */
    #offline-banner {
      display: none; position: fixed; top: 0; left: 0; right: 0;
      background: rgba(239,68,68,0.9); color: #fff;
      text-align: center; padding: 8px; font-size: 13px;
      font-weight: 600; z-index: 9998;
    }
    #offline-banner.show { display: block; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      :root { --sidebar-w: 260px; }
      .sidebar { position: fixed; top: 0; left: 0; height: 100%; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      #menuToggle { display: flex; }
      .content { width: 100%; }
      #view { padding: 16px; }
      .action-grid { grid-template-columns: 1fr; }
      .welcome h2 { font-size: 22px; }
      .welcome-icon { font-size: 52px; }
    }

    @media (min-width: 769px) and (max-width: 1024px) {
      :root { --sidebar-w: 200px; }
      .nav-btn { font-size: 14px; padding: 10px 12px; }
    }
  </style>
</head>

async function initData() {
  try {
    const meta = await db.collection("meta").doc("init").get();
    if (meta.exists && meta.data().version === INIT_VERSION) return;
    const batch = db.batch();
    cardsData.forEach(c =>
      batch.set(db.collection("cards").doc(c.cardId), {name:c.name, activeLoan:false}, {merge:true})
    );
    gamesData.forEach(g =>
      batch.set(db.collection("games").doc(g.gameId), {title:g.title, isLoaned:false, category:g.category}, {merge:true})
    );
    batch.set(db.collection("meta").doc("init"), {version:INIT_VERSION, at:firebase.firestore.Timestamp.now()});
    await batch.commit();
  } catch(e) { console.warn("initData:", e); }
}
initData();

// ═══════════════════════════════════════════
//  XSS SAFETY
// ═══════════════════════════════════════════
function esc(str) {
  return String(str)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

// ═══════════════════════════════════════════
//  SCANNER
// ═══════════════════════════════════════════
let qrScanner = null;
let scannerRunning = false;
let scanLock = false;

async function stopScanner() {
  if (qrScanner && scannerRunning) {
    try { await qrScanner.stop(); } catch(_) {}
    scannerRunning = false;
  }
}

function startScanner() {
  stopScanner().then(() => {
    scanLock = false;
    qrScanner = new Html5Qrcode("reader");
    qrScanner.start(
      {facingMode:"environment"},
      {fps:10, qrbox:{width:250,height:250}},
      code => {
        if (scanLock) return;
        scanLock = true;
        const el = document.getElementById("scanResult");
        if (el) el.textContent = "Skannar: " + code;
        handleCardScan(code);
      },
      () => {}
    )
    .then(() => { scannerRunning = true; })
    .catch(() => {
      const el = document.getElementById("scanResult");
      if (el) el.textContent = "Kunde inte starta kamera — använd manuell inmatning nedan.";
    });
  });
}

// ═══════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════
const VIEW_TITLES = {
  scan:"Låna / Lämna", active:"Aktiva lån",
  cards:"Lånekort", games:"Spel", pyssel:"Pyssel-kit", history:"Historik"
};

function navigate(view, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById("topbarTitle").textContent = VIEW_TITLES[view] || "Spelutlåning";
  showView(view);
}

function setView(html) {
  stopScanner();
  document.getElementById("view").innerHTML = html;
  closeSidebar();
}

function closeSidebar() {
  document.querySelector('.sidebar').classList.remove('open');
  document.querySelector('.overlay').classList.remove('active');
}
function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.querySelector('.overlay').classList.toggle('active');
}

// ═══════════════════════════════════════════
//  VIEWS
// ═══════════════════════════════════════════
async function showView(view) {

  if (view === "scan") {
    setView(`
      <div class="view-header"><h2>Skanna lånekort</h2></div>
      <div class="scanner-wrap">
        <div id="reader"></div>
        <p id="scanResult" class="scan-hint">Rikta kameran mot QR-koden</p>
        <div class="manual-entry">
          <input type="text" id="manualId" placeholder="Manuellt kort-ID (LK-01)" maxlength="8"
            onkeydown="if(event.key==='Enter')manualLookup()">
          <button onclick="manualLookup()">Sök</button>
        </div>
      </div>`);
    startScanner();
    return;
  }

  if (view === "active") {
    setView(`<div class="view-header"><h2>Aktiva lån</h2></div><div class="loading">Laddar...</div>`);
    try {
      const snap = await db.collection("activeLoans").get();
      if (snap.empty) {
        document.getElementById("view").innerHTML =
          `<div class="view-header"><h2>Aktiva lån</h2></div><div class="empty-state">🎉 Inga aktiva lån just nu</div>`;
        return;
      }
      let rows = "";
      snap.forEach(doc => {
        const l = doc.data();
        const icon = l.category === "pyssel" ? "✂️" : "🎲";
        rows += `<div class="list-item clickable" onclick="quickReturn('${esc(doc.id)}')">
          <div class="item-icon">${icon}</div>
          <div class="item-info">
            <span class="item-title">${esc(l.gameTitle)}</span>
            <span class="item-sub">${esc(l.name)} · ${esc(l.loanedAt)}</span>
          </div>
          <span class="item-action">Återlämna →</span>
        </div>`;
      });
      document.getElementById("view").innerHTML =
        `<div class="view-header"><h2>Aktiva lån</h2><span class="badge">${snap.size}</span></div>
         <div class="list">${rows}</div>`;
    } catch(e) { showError(e); }
    return;
  }

  if (view === "cards") {
    setView(`<div class="view-header"><h2>Lånekort</h2></div><div class="loading">Laddar...</div>`);
    try {
      const snap = await db.collection("cards").orderBy("name").get();
      let rows = "";
      snap.forEach(doc => {
        const c = doc.data();
        const sub = doc.id + (c.activeLoan && c.currentGame ? ' · ' + c.currentGame : '');
        rows += `<div class="list-item" data-search="${esc(c.name.toLowerCase())} ${doc.id.toLowerCase()}">
          <div class="item-icon avatar">${esc(c.name[0])}</div>
          <div class="item-info">
            <span class="item-title">${esc(c.name)}</span>
            <span class="item-sub">${esc(sub)}</span>
          </div>
          <span class="status-pill ${c.activeLoan?'loaned':'free'}">${c.activeLoan?'Har lån':'Ledig'}</span>
        </div>`;
      });
      document.getElementById("view").innerHTML =
        `<div class="view-header"><h2>Lånekort</h2><span class="badge">${snap.size}</span></div>
         <div class="search-wrap"><span class="search-icon">🔍</span>
           <input type="text" placeholder="Sök namn eller kort-ID…" oninput="filterList(this.value)">
         </div>
         <div class="list" id="itemList">${rows}</div>
         <div class="no-results" id="noResults">Inga resultat</div>`;
    } catch(e) { showError(e); }
    return;
  }

  if (view === "games") {
    setView(`<div class="view-header"><h2>Spel</h2></div><div class="loading">Laddar...</div>`);
    try {
      const snap = await db.collection("games").where("category","==","spel").orderBy("title").get();
      let available = 0, rows = "";
      snap.forEach(doc => {
        const g = doc.data();
        if (!g.isLoaned) available++;
        rows += `<div class="list-item" data-search="${esc(g.title.toLowerCase())}">
          <div class="item-icon">🎮</div>
          <div class="item-info"><span class="item-title">${esc(g.title)}</span></div>
          <span class="status-pill ${g.isLoaned?'loaned':'free'}">${g.isLoaned?'Utlånad':'Tillgänglig'}</span>
        </div>`;
      });
      document.getElementById("view").innerHTML =
        `<div class="view-header"><h2>Spel</h2><span class="badge">${available} lediga</span></div>
         <div class="search-wrap"><span class="search-icon">🔍</span>
           <input type="text" placeholder="Sök spel…" oninput="filterList(this.value)">
         </div>
         <div class="list" id="itemList">${rows}</div>
         <div class="no-results" id="noResults">Inga resultat</div>`;
    } catch(e) { showError(e); }
    return;
  }

  if (view === "pyssel") {
    setView(`<div class="view-header"><h2>Pyssel-kit</h2></div><div class="loading">Laddar...</div>`);
    try {
      const snap = await db.collection("games").where("category","==","pyssel").orderBy("title").get();
      let available = 0, rows = "";
      snap.forEach(doc => {
        const g = doc.data();
        if (!g.isLoaned) available++;
        rows += `<div class="list-item" data-search="${esc(g.title.toLowerCase())}">
          <div class="item-icon">✂️</div>
          <div class="item-info"><span class="item-title">${esc(g.title)}</span></div>
          <span class="status-pill ${g.isLoaned?'loaned':'free'}">${g.isLoaned?'Utlånad':'Tillgänglig'}</span>
        </div>`;
      });
      document.getElementById("view").innerHTML =
        `<div class="view-header"><h2>Pyssel-kit</h2><span class="badge">${available} lediga</span></div>
         <div class="search-wrap"><span class="search-icon">🔍</span>
           <input type="text" placeholder="Sök pyssel-kit…" oninput="filterList(this.value)">
         </div>
         <div class="list" id="itemList">${rows}</div>
         <div class="no-results" id="noResults">Inga resultat</div>`;
    } catch(e) { showError(e); }
    return;
  }

  if (view === "history") {
    setView(`<div class="view-header"><h2>Historik</h2></div><div class="loading">Laddar...</div>`);
    try {
      const snap = await db.collection("history").orderBy("timestamp","desc").limit(100).get();
      if (snap.empty) {
        document.getElementById("view").innerHTML =
          `<div class="view-header"><h2>Historik</h2></div><div class="empty-state">Ingen historik ännu</div>`;
        return;
      }
      let rows = "";
      snap.forEach(doc => {
        const h = doc.data();
        const isLoan = h.action === "loan";
        rows += `<div class="list-item" data-search="${esc(h.name.toLowerCase())} ${esc(h.gameTitle.toLowerCase())}">
          <div class="item-icon">${isLoan?'📤':'📥'}</div>

            <span class="item-title">${esc(h.name)} ${isLoan?'lånade':'lämnade tillbaka'} ${esc(h.gameTitle)}</span>
            <span class="item-sub">${h.timestamp.toDate().toLocaleString("sv-SE")}</span>
          </div>
        </div>`;
      });
      document.getElementById("view").innerHTML =
        `<div class="view-header"><h2>Historik</h2></div>
         <div class="search-wrap"><span class="search-icon">🔍</span>

         </div>
         <div class="list" id="itemList">${rows}</div>

    return;
  }

// ═══════════════════════════════════════════
//  SEARCH FILTER
// ═══════════════════════════════════════════
function filterList(query) {
  const q = query.toLowerCase().trim();
  const items = document.querySelectorAll("#itemList .list-item");
  let visible = 0;
  items.forEach(item => {
    const match = !q || (item.dataset.search || "").includes(q);
    item.classList.toggle("hidden", !match);
    if (match) visible++;
  });
  const noRes = document.getElementById("noResults");
  if (noRes) noRes.classList.toggle("visible", visible === 0 && q.length > 0);
}

// ═══════════════════════════════════════════
//  MANUAL LOOKUP
// ═══════════════════════════════════════════
function manualLookup() {
  const val = (document.getElementById("manualId")?.value || "").trim().toUpperCase();
  if (!val) { showToast("Ange ett kort-ID"); return; }
  handleCardScan(val);
}

// ═══════════════════════════════════════════
//  LOAN FLOW
// ═══════════════════════════════════════════
async function handleCardScan(cardId) {
  try {
    const doc = await db.collection("cards").doc(cardId).get();
    if (!doc.exists) { showToast("❌ Kortet finns inte: " + cardId); scanLock = false; return; }
    const card = doc.data();
    stopScanner();
    document.getElementById("view").innerHTML = `
      <div class="view-header"><h2>Kort identifierat</h2></div>
      <div class="card-profile">
        <div class="profile-avatar">${esc(card.name[0])}</div>
        <div class="profile-name">${esc(card.name)}</div>
        <div class="profile-id">${esc(cardId)}</div>
        <div class="profile-loan-status ${card.activeLoan?'active':'free'}">
          ${card.activeLoan ? '🔴 Har aktivt lån' : '🟢 Ingen låning aktiv'}
        </div>
      </div>
      <div class="action-grid">
        <button class="action-btn primary"   onclick="showBorrow('${esc(cardId)}')">📤 Låna spel</button>
        <button class="action-btn secondary" onclick="showReturn('${esc(cardId)}')">📥 Lämna tillbaka</button>
      </div>
      <button class="back-btn" onclick="navigate('scan', document.getElementById('nav-scan'))">← Tillbaka</button>`;
  } catch(e) { showError(e); }
}

async function showBorrow(cardId) {
  try {
    const card = (await db.collection("cards").doc(cardId).get()).data();
    if (card.activeLoan) {
      document.getElementById("view").innerHTML = `
        <div class="view-header"><h2>Kan ej låna</h2></div>
        <div class="alert warning">${esc(card.name)} har redan ett aktivt lån och måste lämna tillbaka först.</div>
        <button class="back-btn" onclick="navigate('scan', document.getElementById('nav-scan'))">← Tillbaka</button>`;
      return;
    }
    // Count available per category
    const [gamesSnap, pysselSnap] = await Promise.all([
      db.collection("games").where("category","==","spel").where("isLoaned","==",false).get(),
      db.collection("games").where("category","==","pyssel").where("isLoaned","==",false).get()
    ]);
    document.getElementById("view").innerHTML = `
      <div class="view-header"><h2>Vad vill du låna?</h2><span class="badge">${esc(card.name)}</span></div>
      <div class="cat-tabs">
        <button class="cat-tab" onclick="showBorrowCategory('${esc(cardId)}','spel')">
          <div class="cat-tab-icon">🎮</div>
          <div class="cat-tab-label">Spel</div>
          <div class="cat-tab-count">${gamesSnap.size} tillgängliga</div>
        </button>
        <button class="cat-tab" onclick="showBorrowCategory('${esc(cardId)}','pyssel')">
          <div class="cat-tab-icon">✂️</div>
          <div class="cat-tab-label">Pyssel-kit</div>
          <div class="cat-tab-count">${pysselSnap.size} tillgängliga</div>
        </button>
      </div>
      <button class="back-btn" onclick="navigate('scan', document.getElementById('nav-scan'))">← Avbryt</button>`;
  } catch(e) { showError(e); }
}

async function showBorrowCategory(cardId, category) {
  try {
    const card = (await db.collection("cards").doc(cardId).get()).data();
    const isSpel = category === "spel";
    const icon = isSpel ? "🎮" : "✂️";
    const label = isSpel ? "spel" : "pyssel-kit";
    const placeholder = isSpel ? "Sök spel…" : "Sök pyssel-kit…";

    const gamesSnap = await db.collection("games")
      .where("category","==",category)
      .where("isLoaned","==",false)
      .orderBy("title").get();

    if (gamesSnap.empty) {
      document.getElementById("view").innerHTML = `
        <div class="view-header"><h2>Inga ${label}</h2></div>
        <div class="alert warning">Inga ${label} är tillgängliga just nu.</div>
        <button class="back-btn" onclick="showBorrow('${esc(cardId)}')">← Tillbaka</button>`;
      return;
    }
    let rows = "";
    gamesSnap.forEach(g => {
      rows += `<div class="list-item clickable"
          data-search="${esc(g.data().title.toLowerCase())}"
          onclick="borrowGame('${esc(cardId)}','${esc(g.id)}','${encodeURIComponent(g.data().title)}',this)">
        <div class="item-icon">${icon}</div>
        <div class="item-info"><span class="item-title">${esc(g.data().title)}</span></div>
        <span class="item-action">Låna →</span>
      </div>`;
    });
    document.getElementById("view").innerHTML = `
      <div class="view-header"><h2>Välj ${label}</h2><span class="badge">${esc(card.name)}</span></div>
      <div class="search-wrap"><span class="search-icon">🔍</span>
        <input type="text" placeholder="${placeholder}" oninput="filterList(this.value)" autofocus>
      </div>
      <div class="list" id="itemList">${rows}</div>
      <div class="no-results" id="noResults">Inga resultat</div>
      <button class="back-btn" style="margin-top:12px" onclick="showBorrow('${esc(cardId)}')">← Tillbaka</button>`;
  } catch(e) { showError(e); }
}

async function borrowGame(cardId, gameId, encodedTitle, el) {
  if (el) { el.style.pointerEvents = "none"; el.style.opacity = "0.5"; }
  const gameTitle = decodeURIComponent(encodedTitle);
  try {
    const cardRef = db.collection("cards").doc(cardId);
    const cardData = (await cardRef.get()).data();
    const gameDoc = await db.collection("games").doc(gameId).get();
    const category = gameDoc.data().category || "spel";
    const batch = db.batch();
    batch.update(cardRef, {activeLoan:true, currentGame:gameTitle});
    batch.update(db.collection("games").doc(gameId), {isLoaned:true});
    batch.set(db.collection("activeLoans").doc(cardId), {
      cardId, gameId, gameTitle, name:cardData.name, category,
      loanedAt: new Date().toLocaleString("sv-SE")
    });
    await batch.commit();
    await db.collection("history").add({
      cardId, gameId, gameTitle, name:cardData.name, action:"loan", category,
      timestamp: firebase.firestore.Timestamp.now()
    });
    showToast(`✅ ${cardData.name} har lånat ${gameTitle}`);
    navigate("scan", document.getElementById("nav-scan"));
  } catch(e) {
    if (el) { el.style.pointerEvents = ""; el.style.opacity = ""; }
    showError(e);
  }
}

async function showReturn(cardId) {
  try {
    const card = (await db.collection("cards").doc(cardId).get()).data();
    if (!card.activeLoan) {
      document.getElementById("view").innerHTML = `
        <div class="view-header"><h2>Inget lån</h2></div>
        <div class="alert info">${esc(card.name)} har inga aktiva lån.</div>
        <button class="back-btn" onclick="navigate('scan', document.getElementById('nav-scan'))">← Tillbaka</button>`;
      return;
    }
    const loan = (await db.collection("activeLoans").doc(cardId).get()).data();
    const loanIcon = loan.category === "pyssel" ? "✂️" : "🎮";
    document.getElementById("view").innerHTML = `
      <div class="view-header"><h2>Återlämna</h2></div>
      <div class="return-card">
        <div class="return-game">${loanIcon} ${esc(loan.gameTitle)}</div>
        <div class="return-person">Lånad av: ${esc(card.name)}</div>
        <div class="return-time">Sedan: ${esc(loan.loanedAt)}</div>
      </div>
      <div class="action-grid">
        <button class="action-btn primary" id="confirmReturnBtn"
          onclick="returnGame('${esc(cardId)}','${esc(loan.gameId)}','${encodeURIComponent(loan.gameTitle)}')">
          ✅ Bekräfta återlämning
        </button>
      </div>
      <button class="back-btn" onclick="navigate('scan', document.getElementById('nav-scan'))">← Avbryt</button>`;
  } catch(e) { showError(e); }
}

async function returnGame(cardId, gameId, encodedTitle) {
  const btn = document.getElementById("confirmReturnBtn");
  if (btn) { btn.disabled = true; btn.textContent = "Sparar…"; }
  const gameTitle = decodeURIComponent(encodedTitle);
  try {
    const cardRef = db.collection("cards").doc(cardId);
    const cardName = (await cardRef.get()).data().name;
    const batch = db.batch();
    batch.update(cardRef, {activeLoan:false, currentGame:firebase.firestore.FieldValue.delete()});
    batch.update(db.collection("games").doc(gameId), {isLoaned:false});
    batch.delete(db.collection("activeLoans").doc(cardId));
    await batch.commit();
    await db.collection("history").add({
      cardId, gameId, gameTitle, name:cardName, action:"return",
      timestamp: firebase.firestore.Timestamp.now()
    });
    showToast(`✅ ${cardName} har lämnat tillbaka ${gameTitle}`);
    navigate("scan", document.getElementById("nav-scan"));
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = "✅ Bekräfta återlämning"; }
    showError(e);
  }
}

async function quickReturn(cardId) {
  try {
    const loanDoc = await db.collection("activeLoans").doc(cardId).get();
    if (!loanDoc.exists) { showToast("❌ Hittade inte lånet"); return; }
    await showReturn(cardId);
  } catch(e) { showError(e); }
}

// ═══════════════════════════════════════════
//  TOAST & ERROR
// ═══════════════════════════════════════════
let toastTimer = null;
function showToast(msg) {
  let toast = document.getElementById("toast");
  if (!toast) {
    toast = document.createElement("div");
    toast.id = "toast";
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.classList.add("show");
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("show"), 3000);
}

function showError(e) {
  console.error(e);
  document.getElementById("view").innerHTML = `
    <div class="view-header"><h2>Något gick fel</h2></div>
    <div class="alert error">⚠️ ${esc(e.message || "Okänt fel")} — kontrollera nätverket och försök igen.</div>
    <button class="back-btn" onclick="navigate('scan', document.getElementById('nav-scan'))">← Tillbaka</button>`;
}
